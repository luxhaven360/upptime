# ══════════════════════════════════════════════════════════════
#  .upptimerc.yml — Configurazione Upptime per LuxHaven360
#  Posiziona questo file nella root del tuo repo Upptime
# ══════════════════════════════════════════════════════════════

owner: luxhaven360           
repo:  upptime                
userAgent: LuxHaven360-Upptime

sites:
  - name: LuxHaven360
    url: https://luxhaven360.com

  - name: API LuxHaven360
    url: https://api.luxhaven360.com/health
    method: GET
    expectedStatusCodes:
      - 200
      - 201

  - name: Prenotazioni
    url: https://booking.luxhaven360.com

  - name: CDN Assets
    url: https://cdn.luxhaven360.com

notification:
  email:
    - luxhaven360@gmail.com

statusWebsite:
  cname: status.luxhaven360.com
  logoUrl: https://luxhaven360.com/logo.png
  name: LuxHaven360 Status
  introTitle: "Stato dei sistemi LuxHaven360"
  introMessage: "Monitoriamo i nostri servizi in tempo reale."
  navbar:
    - title: Sito principale
      href: https://luxhaven360.com
    - title: Segnala un problema
      href: https://reports.luxhaven360.com

issues:
  label: "incident"

delay: 0
skipDeleteIssues: false
assignees:
  - luxhaven360
